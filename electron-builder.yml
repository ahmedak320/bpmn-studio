appId: ae.orbitpm.processstudio
productName: OrbitPM Process Studio
copyright: Copyright © 2026 ahmedak320

# resources/icon.svg is the source of truth (deep-blue rounded square, white
# circle -> rounded-rect -> diamond BPMN motif). resources/icon.ico (16-256
# multi-size) and resources/icon.png (512) are generated from it — see
# scratchpad report C3.md for the generator script if it needs regenerating.

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

asarUnpack:
  - resources/**

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
  fileAssociations:
    - ext: bpmn
      name: BPMN Diagram
      description: BPMN 2.0 Process Diagram
      icon: resources/icon.ico
      role: Editor

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  runAfterFinish: true
  artifactName: ${productName}-Setup-${version}.${ext}
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

publish:
  provider: github
  owner: ahmedak320
  repo: bpmn-studio

# NOTE: unsigned build — do NOT set verifyUpdateCodeSignature or a
# publisherName override; electron-updater's GitHub provider works fine
# unsigned for per-user (HKCU) NSIS installs. Revisit Azure Trusted Signing
# only if the laptop SmartScreen experiment (wave A2/G) blocks the install.
