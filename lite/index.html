<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Self-containment guard. Everything the page needs is inlined at build
      time, so the only things this policy permits over the network are
      (a) the user's own AI calls to the three CORS-capable providers
      (OpenRouter, Anthropic, Gemini) and (b) the two free translation
      endpoints — Google's gtx endpoint and MyMemory — that back the Translate
      button when no AI key is stored (see src/ai/freeTranslate.ts).
      `data:`/`blob:` cover the inlined fonts, icons and the PNG-export
      canvas. connect-src is a CLOSED allowlist on purpose: a user-supplied
      Custom OpenAI-compatible endpoint is NOT listed here, so it cannot be
      reached from the browser — the Custom provider is therefore surfaced as
      "desktop app only" in Settings/AI (see providersLite.ts).
    -->
    <!--
      object-src 'none' (no plugins/embeds), base-uri 'self' (no <base> hijack),
      form-action 'self' (no off-origin form posts) harden the page beyond
      default-src. connect-src stays a closed egress allowlist: exactly the
      five hosts listed, nothing else.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.anthropic.com https://generativelanguage.googleapis.com https://openrouter.ai https://translate.googleapis.com https://api.mymemory.translated.net; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <!-- Empty data: icon prevents the browser from fetching /favicon.ico on
         load (which would be an external request); main.tsx swaps in the real
         OrbitPM icon (reused from resources/icon.svg) as a data: URI. -->
    <link id="favicon" rel="icon" href="data:," />
    <title>OrbitPM Process Studio Lite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
